<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>羅針盤</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; worker-src 'self'; manifest-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'">
    <meta name="referrer" content="no-referrer">
    <meta name="robots" content="noindex,nofollow,noarchive">
    <meta name="theme-color" content="#f7eddc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="羅針盤">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icon.svg">
    <style>
:root {
    --bg: #fcf2df;
    --surface: #fffdf8;
    --surface-soft: #fbf4e8;
    --ink: #4a4039;
    --muted: #746b62;
    --line: #eadfce;
    --hairline: #f5ebdc;
    --accent: #c7b198;
    --accent-dark: #6d5b4c;
    --sage: #6e7a6e;
    --sage-soft: #eef4ec;
    --mist: #f7f7f1;
    --paper: #fffaf2;
    --shadow: 0 16px 38px rgba(51, 42, 42, 0.055);
    --heading: "Kiwi Maru", "Shippori Mincho", "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", serif;
    --body: "Zen Maru Gothic", -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    --hand: "YuKyokasho", "Tsukushi A Round Gothic", "Hiragino Maru Gothic ProN", "Kiwi Maru", cursive;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background:
        linear-gradient(180deg, rgba(255, 253, 252, 0.94), rgba(247, 243, 242, 0.96)),
        var(--bg);
    color: var(--ink);
    font-family: var(--body);
    line-height: 1.78;
    letter-spacing: 0.04em;
}

button,
textarea,
select {
    font: inherit;
}

.app-header {
    position: sticky;
    top: 0;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: calc(16px + env(safe-area-inset-top)) 18px 12px;
    background: rgba(251, 248, 248, 0.94);
    border-bottom: 1px solid var(--line);
    backdrop-filter: blur(18px);
}

.app-header h1 {
    margin: 0;
    font-family: var(--heading);
    font-size: 25px;
    font-weight: 700;
    letter-spacing: 0.04em;
    line-height: 1.2;
}

.eyebrow {
    margin: 0 0 4px;
    color: var(--accent-dark);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.12em;
}

.tabs {
    position: sticky;
    top: 76px;
    z-index: 4;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    padding: 10px 12px;
    background: rgba(251, 248, 248, 0.94);
    border-bottom: 1px solid var(--line);
    backdrop-filter: blur(18px);
}

.tabs button,
.lesson-strip button,
.primary,
.ghost,
.chip {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface);
    color: var(--ink);
    min-height: 42px;
    padding: 9px 12px;
    font-weight: 650;
    letter-spacing: 0.04em;
}

.tabs button.is-active,
.lesson-strip button.is-active,
.primary {
    background: var(--accent-dark);
    border-color: var(--accent-dark);
    color: #fff;
    font-weight: 700;
}

.ghost {
    background: rgba(255, 253, 252, 0.62);
    color: var(--accent-dark);
}

.small {
    min-height: 36px;
    padding: 6px 12px;
    font-size: 13px;
}

.app-main {
    width: min(980px, 100%);
    margin: 0 auto;
    padding: 20px 16px 52px;
}

.hero,
.card,
.lesson-card,
.work-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: var(--shadow);
}

.hero {
    padding: 26px 24px;
}

.hero-visual {
    position: relative;
    min-height: 300px;
    overflow: hidden;
    display: grid;
    align-content: end;
    background:
        linear-gradient(115deg, rgba(255, 253, 248, 0.94), rgba(255, 253, 248, 0.68)),
        var(--hero-image) center / cover no-repeat,
        var(--surface);
}

.hero-visual::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
        radial-gradient(circle at 18% 20%, rgba(255, 255, 255, 0.62), transparent 38%),
        linear-gradient(90deg, rgba(255, 253, 248, 0.94), rgba(255, 253, 248, 0.58) 54%, rgba(255, 253, 248, 0.18));
}

.hero-visual::after {
    content: "";
    position: absolute;
    inset: 12px;
    border: 1px solid rgba(255, 255, 255, 0.64);
    border-radius: 7px;
    pointer-events: none;
}

.hero-visual > * {
    position: relative;
    z-index: 1;
    max-width: 720px;
}

.hero-compact {
    min-height: 230px;
}

.hero h2,
.section-title {
    margin: 0 0 12px;
    font-family: var(--heading);
    font-size: clamp(25px, 4.8vw, 34px);
    font-weight: 700;
    line-height: 1.38;
    letter-spacing: 0.03em;
}

.hero p,
.card p,
.work-card p,
.empty {
    color: var(--muted);
}

.hero-highlight {
    background:
        linear-gradient(135deg, rgba(255, 253, 248, 0.96), rgba(238, 244, 236, 0.78)),
        var(--surface);
}

.grid {
    display: grid;
    gap: 12px;
}

.lesson-grid {
    display: grid;
    gap: 14px;
    margin-top: 16px;
}

.lesson-card {
    padding: 18px;
    overflow: hidden;
}

.lesson-card-image {
    aspect-ratio: 16 / 9;
    margin: -18px -18px 16px;
    overflow: hidden;
    background: var(--surface-soft);
    border-bottom: 1px solid var(--line);
}

.lesson-card-image img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    filter: saturate(0.86) contrast(0.96) brightness(1.04);
}

.lesson-card h3,
.work-card h3,
.card h3 {
    margin: 0 0 8px;
    font-family: var(--heading);
    font-size: 20px;
    line-height: 1.45;
    letter-spacing: 0.02em;
}

.lesson-card .meta,
.meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 10px 0;
}

.pill,
.status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border-radius: 999px;
    padding: 4px 10px;
    background: var(--surface-soft);
    color: var(--accent-dark);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
}

.status-pill.done {
    background: var(--sage-soft);
    color: var(--sage);
}

.actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 18px;
}

.guide-steps {
    counter-reset: step;
    display: grid;
    gap: 10px;
    margin-top: 14px;
}

.guide-step {
    counter-increment: step;
    display: grid;
    grid-template-columns: 34px 1fr;
    gap: 10px;
    align-items: start;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--paper);
}

.guide-step::before {
    content: counter(step);
    display: grid;
    place-items: center;
    width: 30px;
    height: 30px;
    border-radius: 999px;
    background: var(--accent-dark);
    color: #fff;
    font-weight: 800;
}

.lesson-strip {
    display: grid;
    grid-template-columns: repeat(6, minmax(48px, 1fr));
    gap: 8px;
    margin-bottom: 14px;
}

.lesson-strip button {
    padding: 8px 4px;
    font-weight: 700;
}

.card,
.work-card {
    padding: 18px;
    margin-top: 14px;
}

.lead {
    color: var(--ink);
    font-size: 17px;
}

.list {
    display: grid;
    gap: 10px;
    margin: 0;
    padding: 0;
    list-style: none;
}

.list li {
    padding: 11px 12px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 8px;
}

.timeline {
    display: grid;
    gap: 10px;
}

.timeline-item {
    display: grid;
    grid-template-columns: 72px 1fr;
    gap: 12px;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--paper);
}

.timeline-time {
    color: var(--accent-dark);
    font-weight: 800;
    letter-spacing: 0.03em;
}

.timeline-title {
    font-weight: 800;
}

.timeline-purpose {
    color: var(--muted);
    font-size: 14px;
}

.teacher-note {
    display: none;
    margin-top: 10px;
    padding: 10px;
    border-left: 3px solid var(--sage);
    background: var(--sage-soft);
    border-radius: 8px;
    color: #294536;
}

body.teacher-on .teacher-note {
    display: block;
}

.field {
    display: grid;
    gap: 7px;
    margin-top: 12px;
}

.field span {
    color: var(--ink);
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.03em;
}

textarea,
select,
input {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255, 253, 252, 0.88);
    color: var(--ink);
    padding: 12px;
    resize: vertical;
}

textarea:focus,
select:focus,
input:focus,
button:focus {
    outline: 3px solid rgba(169, 95, 106, 0.18);
    outline-offset: 2px;
}

.prompt-list {
    display: grid;
    gap: 10px;
}

.prompt {
    padding: 12px;
    border-radius: 8px;
    background: var(--paper);
    border: 1px solid var(--line);
    font-weight: 700;
}

.aroma-answer {
    margin-top: 12px;
    padding: 13px;
    border-radius: 8px;
    background: var(--surface-soft);
}

.note-grid {
    display: grid;
    gap: 10px;
}

.note-input {
    min-height: 76px;
}

.sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
}

.section-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 14px;
    margin-bottom: 10px;
}

.section-head h3,
.section-head .eyebrow {
    margin-bottom: 0;
}

.interactive-compass {
    position: relative;
    min-height: 620px;
    margin-top: 18px;
    overflow: hidden;
    border: 1px solid var(--line);
    border-radius: 8px;
    background:
        linear-gradient(180deg, rgba(255, 253, 248, 0.16), rgba(255, 253, 248, 0.34)),
        var(--compass-image) center / cover no-repeat,
        var(--paper);
    box-shadow: inset 0 0 0 12px rgba(255, 253, 248, 0.24);
    touch-action: none;
}

.interactive-compass::after {
    content: "";
    position: absolute;
    inset: 16px;
    border: 1px solid rgba(255, 253, 248, 0.7);
    border-radius: 6px;
    pointer-events: none;
}

.board-axis {
    position: absolute;
    z-index: 1;
    border-radius: 999px;
    padding: 5px 11px;
    background: rgba(81, 70, 72, 0.72);
    color: #fffaf8;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    backdrop-filter: blur(8px);
}

.board-axis-top {
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
}

.board-axis-bottom {
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
}

.board-axis-left {
    top: 50%;
    left: -54px;
    transform: translateY(-50%) rotate(-90deg);
}

.board-axis-right {
    top: 50%;
    right: -46px;
    transform: translateY(-50%) rotate(90deg);
}

.board-add-button,
.trash-zone {
    position: absolute;
    bottom: var(--control-bottom, 22px);
    z-index: 6;
    display: grid;
    place-items: center;
    width: var(--control-size, 50px);
    height: var(--control-size, 50px);
    border: 1px solid rgba(115, 91, 75, 0.22);
    border-radius: 50%;
    background: rgba(255, 253, 248, 0.54);
    color: rgba(109, 91, 76, 0.68);
    font-size: 24px;
    font-weight: 800;
    opacity: 0.74;
    box-shadow: 0 10px 24px rgba(80, 62, 48, 0.08);
    backdrop-filter: blur(12px);
    transition: transform 0.18s ease, background 0.18s ease, opacity 0.18s ease, border-color 0.18s ease, color 0.18s ease;
}

.board-add-button {
    left: var(--control-side, 24px);
}

.trash-zone {
    right: var(--control-side, 24px);
}

.trash-icon {
    width: calc(var(--control-size, 50px) * 0.56);
    height: calc(var(--control-size, 50px) * 0.56);
    fill: none;
    stroke: currentColor;
    stroke-width: 1.45;
    stroke-linecap: round;
    stroke-linejoin: round;
}

.trash-icon-lid {
    opacity: 0.72;
}

.board-add-button:hover,
.board-add-button:focus {
    opacity: 1;
    background: rgba(255, 253, 248, 0.92);
}

.trash-zone.is-ready {
    opacity: 1;
    background: rgba(255, 253, 248, 0.76);
}

.trash-zone.is-over {
    transform: scale(1.08);
    background: rgba(255, 246, 238, 0.9);
    border-color: rgba(137, 93, 73, 0.38);
    color: #79513f;
}

.board-note {
    position: absolute;
    z-index: 2;
    width: min(var(--note-width, 188px), 74vw);
    transform: translate(-50%, -50%) rotate(var(--tilt, -1.2deg));
    border: 1px solid rgba(232, 220, 175, 0.72);
    border-radius: 2px;
    background:
        linear-gradient(180deg, rgba(255, 253, 230, 0.98), rgba(255, 249, 211, 0.96));
    box-shadow:
        0 10px 16px rgba(94, 76, 30, 0.12),
        0 2px 3px rgba(94, 76, 30, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.62);
    backdrop-filter: blur(2px);
    cursor: grab;
    overflow: hidden;
    user-select: none;
}

.board-note:nth-of-type(3n + 1) {
    --tilt: -1.8deg;
}

.board-note:nth-of-type(3n + 2) {
    --tilt: 1.3deg;
}

.board-note:nth-of-type(3n + 3) {
    --tilt: -0.4deg;
}

.board-note.is-dragging {
    z-index: 5;
    transform: translate(-50%, -50%) rotate(0deg) scale(1.02);
    cursor: grabbing;
    box-shadow: 0 20px 36px rgba(83, 66, 42, 0.24);
}

.board-note.is-placeholder {
    opacity: 0.72;
}

.board-note input {
    position: relative;
    z-index: 1;
    width: 100%;
    height: var(--note-height, 40px);
    border: 0;
    border-radius: 2px;
    background: transparent;
    color: #6b4a35;
    font-family: var(--hand);
    font-size: var(--note-font-size, 16px);
    font-weight: 600;
    letter-spacing: 0.04em;
    line-height: var(--note-height, 40px);
    white-space: nowrap;
    overflow: visible;
    text-overflow: clip;
    box-shadow: none;
    cursor: text;
    padding: 0 1.3px;
    text-align: center;
    user-select: text;
}

.board-note.is-dragging input {
    cursor: grabbing;
}

.board-note input::placeholder {
    color: rgba(107, 74, 53, 0.42);
}

.board-note input:focus {
    outline: none;
    box-shadow: none;
}

.compass-app-shell {
    display: grid;
    gap: 12px;
}

.rotate-hint {
    display: none;
}

.compass-app-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 4px 2px 0;
}

.compass-app-toolbar h2 {
    margin: 0;
    font-family: var(--heading);
    font-size: 24px;
    letter-spacing: 0.05em;
}

.compass {
    position: relative;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 16px;
    padding: 44px 0 42px;
}

.quadrant {
    min-height: 210px;
    padding: 15px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--paper);
}

.quadrant.rightTop {
    background: #f4faf6;
    border-color: #d8e9dd;
}

.quadrant.leftTop {
    background: #fff9f4;
    border-color: #ecdeda;
}

.quadrant.rightBottom {
    background: #f5f7fa;
    border-color: #dce3ec;
}

.quadrant.leftBottom {
    background: #fff4f3;
    border-color: #ead2d1;
}

.quadrant h4 {
    margin: 0 0 10px;
    font-family: var(--heading);
    font-size: 14px;
    line-height: 1.6;
    letter-spacing: 0.03em;
}

.axis-label {
    position: absolute;
    z-index: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 999px;
    padding: 5px 11px;
    background: #514648;
    color: #fffaf8;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
}

.axis-label.top {
    top: 0;
    left: 50%;
    transform: translateX(-50%);
}

.axis-label.left {
    top: 50%;
    left: 0;
    transform: translate(-34%, -50%) rotate(-90deg);
}

.axis-label.right {
    top: 50%;
    right: 0;
    transform: translate(34%, -50%) rotate(90deg);
}

.axis-label.bottom {
    bottom: -34px;
    left: 50%;
    transform: translateX(-50%);
}

.sticky {
    margin: 7px 0;
    padding: 10px 11px;
    border-radius: 8px;
    background: #fff8dc;
    border: 1px solid #eee2b7;
    color: #403830;
    font-size: 14px;
    line-height: 1.55;
    box-shadow: 0 6px 12px rgba(92, 75, 49, 0.055);
}

.sticky small {
    display: block;
    color: #83724a;
    font-weight: 800;
    letter-spacing: 0.04em;
}

.profile-card {
    display: grid;
    gap: 8px;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: linear-gradient(180deg, rgba(255, 253, 252, 0.9), rgba(247, 238, 238, 0.76));
}

.profile-card strong {
    color: var(--accent-dark);
}

.note-sorter {
    display: grid;
    gap: 12px;
}

.sort-row {
    display: grid;
    gap: 8px;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255, 253, 252, 0.84);
}

.export-box {
    min-height: 280px;
    white-space: pre-wrap;
}

.toast {
    position: fixed;
    right: 14px;
    bottom: calc(18px + env(safe-area-inset-bottom));
    left: 14px;
    z-index: 10;
    display: none;
    padding: 11px 14px;
    border-radius: 8px;
    background: #514648;
    color: #fffaf8;
    text-align: center;
    box-shadow: 0 14px 28px rgba(51, 42, 42, 0.18);
}

.toast.show {
    display: block;
}

.danger {
    color: #9d2636;
    border-color: #efb7c0;
}

.access-lock {
    display: grid;
    min-height: 100dvh;
    place-items: center;
    padding: 24px;
    color: #6f5138;
    background:
        radial-gradient(circle at 50% 18%, rgba(255, 250, 239, 0.9), rgba(247, 237, 220, 0.72) 38%, rgba(232, 214, 188, 0.78)),
        #f7eddc;
    text-align: center;
}

.access-lock > div {
    max-width: 420px;
    padding: 28px 30px;
    border: 1px solid rgba(140, 105, 74, 0.18);
    border-radius: 8px;
    background: rgba(255, 252, 246, 0.74);
    box-shadow: 0 18px 46px rgba(87, 62, 42, 0.12);
}

.access-lock p {
    margin: 0 0 10px;
    font-family: "Shippori Mincho", "Yu Mincho", serif;
    font-size: 18px;
    letter-spacing: 0.04em;
}

.access-lock span {
    font-size: 13px;
    line-height: 1.8;
}

body.compass-only {
    --control-size: clamp(40px, 8svh, 50px);
    --control-bottom: max(12px, calc(env(safe-area-inset-bottom) + 10px));
    --control-side: max(14px, calc(env(safe-area-inset-left) + 14px));
    --note-height: clamp(32px, 7svh, 40px);
    --note-font-size: clamp(13px, 3svh, 16px);
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    background: #f7eddc;
}

body.compass-only .app-header {
    position: fixed;
    top: 0;
    right: 0;
    left: 0;
    z-index: 8;
    justify-content: center;
    padding: calc(8px + env(safe-area-inset-top)) 16px 0;
    border: 0;
    background: transparent;
    pointer-events: none;
    backdrop-filter: none;
}

body.compass-only .app-header h1 {
    margin: 0;
    padding: 5px 15px 6px;
    border: 1px solid rgba(131, 111, 92, 0.18);
    border-radius: 999px;
    background: rgba(255, 253, 248, 0.38);
    color: rgba(101, 82, 68, 0.82);
    font-family: "Times New Roman", "Shippori Mincho", "Hiragino Mincho ProN", "Yu Mincho", serif;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: 0.12em;
    line-height: 1.2;
    box-shadow: 0 8px 18px rgba(80, 62, 48, 0.05);

const STORAGE_KEY = "torisetsuCourseApp.v1";
const ACCESS_TOKEN_HASH = "a2eca33a6bc4af0694efe3a687a435e0a0bb2cc3b490829399207aaf1a7e8bea";
const ACCESS_STORAGE_KEY = `${STORAGE_KEY}.access`;
const BACKUP_DB_NAME = "torisetsuCompassStorage";
const BACKUP_STORE_NAME = "savedState";
const defaultState = {
    view: "home",
    currentLesson: 1,
    completed: {},
    answers: {},
    manual: {},
    notes: {},
    aromaRevealed: {},
    compass: {},
    boardPositions: {},
    customNoteOrder: [],
    compassStarterCreated: false,
    teacherMode: false,
    finalUnlocked: false,
    demoLoaded: false,
    exportText: ""
};

let state = loadState();
if (appMode === "compass") {
    state.view = "compass";
    state.finalUnlocked = true;
}
const app = document.getElementById("app");
const toast = document.getElementById("toast");

function loadState() {
    try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        return Object.assign({}, defaultState, saved);
    } catch (error) {
        return Object.assign({}, defaultState);
    }
}

function saveState() {
    const snapshot = JSON.stringify(state);
    try {
        localStorage.setItem(STORAGE_KEY, snapshot);
    } catch (error) {
        // iPhoneの容量や設定でlocalStorageが使えない時も、IndexedDB側への保存を試します。
    }
    saveStateBackup(snapshot);
}

function openBackupDb() {
    if (!("indexedDB" in window)) {
        return Promise.reject(new Error("IndexedDB is not available"));
    }

    return new Promise((resolve, reject) => {
        const request = indexedDB.open(BACKUP_DB_NAME, 1);
        request.onupgradeneeded = () => {
            const db = request.result;
            if (!db.objectStoreNames.contains(BACKUP_STORE_NAME)) {
                db.createObjectStore(BACKUP_STORE_NAME, { keyPath: "key" });
            }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
    });
}

function saveStateBackup(snapshot) {
    openBackupDb()
        .then((db) => {
            const transaction = db.transaction(BACKUP_STORE_NAME, "readwrite");
            transaction.objectStore(BACKUP_STORE_NAME).put({
                key: STORAGE_KEY,
                value: snapshot,
                updatedAt: Date.now()
            });
            transaction.oncomplete = () => db.close();
            transaction.onerror = () => db.close();
        })
        .catch(() => {});
}

function loadStateBackup() {
    return openBackupDb()
        .then((db) => new Promise((resolve) => {
            const transaction = db.transaction(BACKUP_STORE_NAME, "readonly");
            const request = transaction.objectStore(BACKUP_STORE_NAME).get(STORAGE_KEY);
            request.onsuccess = () => resolve(request.result && request.result.value ? request.result.value : "");
            request.onerror = () => resolve("");
            transaction.oncomplete = () => db.close();
            transaction.onerror = () => db.close();
        }))
        .catch(() => "");
}

async function restoreStateFromBackup() {
    try {
        const localSnapshot = localStorage.getItem(STORAGE_KEY);
        if (localSnapshot && localSnapshot !== "{}") return false;
    } catch (error) {
        // localStorageを読めない時も、バックアップ復元を続けます。
    }

    const backupSnapshot = await loadStateBackup();
    if (!backupSnapshot) return false;

    try {
        const restored = JSON.parse(backupSnapshot);
        state = Object.assign({}, defaultState, restored);
        if (appMode === "compass") {
            state.view = "compass";
            state.finalUnlocked = true;
        }
        try {
            localStorage.setItem(STORAGE_KEY, backupSnapshot);
        } catch (error) {}
        return true;
    } catch (error) {
        return false;
    }
}

function requestPersistentStorage() {
    if (navigator.storage && navigator.storage.persist) {
        navigator.storage.persist().catch(() => {});
    }
}

function registerServiceWorker() {
    if (!("serviceWorker" in navigator) || window.location.protocol === "file:") return;
    if (!window.isSecureContext && !isLocalPreview()) return;
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js")
            .then(() => navigator.serviceWorker.ready)
            .then(() => {
                const readyKey = `${STORAGE_KEY}.offlineReady`;
                try {
                    if (localStorage.getItem(readyKey) !== "ok") {
                        localStorage.setItem(readyKey, "ok");
                        showToast("iPhone内に保存しました");
                    }
                } catch (error) {}
            })
            .catch(() => {});
    });
}

function ensureStarterNote() {
    if (state.compassStarterCreated || allNotes().length) return;
    const key = "custom_note_first";
    state.customNoteOrder = state.customNoteOrder || [];
    if (!state.customNoteOrder.includes(key)) {
        state.customNoteOrder.push(key);
    }
    state.notes[key] = "";
    state.compass[key] = "rightTop";
    state.boardPositions[key] = { x: 52, y: 52 };
    state.compassStarterCreated = true;
    saveState();
}

function applyDemoData() {
    state.completed = Object.assign({}, demoState.completed);
    state.aromaRevealed = Object.assign({}, demoState.aromaRevealed);
    state.answers = Object.assign({}, state.answers, demoState.answers);
    state.manual = Object.assign({}, state.manual, demoState.manual);
    state.notes = Object.assign({}, state.notes, demoState.notes);
    state.compass = Object.assign({}, demoState.compass);
    state.boardPositions = Object.assign({}, demoState.boardPositions);
    state.customNoteOrder = [];
    state.finalUnlocked = true;
    state.demoLoaded = true;
    state.currentLesson = 6;
    state.view = "compass";
    state.exportText = makeExportText();
    saveState();
}

function escapeHtml(value) {
    return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
}

function isLocalPreview() {
    return window.location.protocol === "file:" || ["localhost", "127.0.0.1", "::1"].includes(window.location.hostname);
}

function cleanAccessUrl() {
    if (!window.history || !window.history.replaceState) return;
    const params = new URLSearchParams(window.location.search);
    params.delete("access");
    params.delete("key");
    const query = params.toString();
    const nextUrl = `${window.location.pathname}${query ? `?${query}` : ""}${window.location.hash}`;
    window.history.replaceState(null, "", nextUrl);
}

async function hashAccessToken(value) {
    if (!window.crypto || !window.crypto.subtle) return "";
    const data = new TextEncoder().encode(value);
    const digest = await window.crypto.subtle.digest("SHA-256", data);
    return Array.from(new Uint8Array(digest))
        .map((byte) => byte.toString(16).padStart(2, "0"))
        .join("");
}

async function ensureAccess() {
    if (isLocalPreview()) return true;
    const params = new URLSearchParams(window.location.search);
    const incomingToken = params.get("access") || params.get("key");
    if (incomingToken && await hashAccessToken(incomingToken) === ACCESS_TOKEN_HASH) {
        try {
            localStorage.setItem(ACCESS_STORAGE_KEY, "ok");
        } catch (error) {}
        cleanAccessUrl();
        return true;
    }
    try {
        return localStorage.getItem(ACCESS_STORAGE_KEY) === "ok";
    } catch (error) {
        return false;
    }
}

function allNotes() {
    const result = [];
    lessons.forEach((lesson) => {
        [0, 1, 2].forEach((index) => {
            const key = `lesson_${lesson.id}_note_${index}`;
            const text = (state.notes[key] || "").trim();
            if (text) {
                result.push({ key, text, lessonId: lesson.id, label: `第${lesson.id}回` });
            }
        });
    });
    (state.customNoteOrder || []).forEach((key, index) => {
        const text = (state.notes[key] || "").trim();
        result.push({ key, text, lessonId: "custom", label: `追加 ${index + 1}` });
    });
    return result;
}

const quadrants = [
    ["rightTop", "今の私に近くて、これからも大切にしたい"],
    ["leftTop", "今の私に近いけれど、少し見直したい"],
    ["rightBottom", "今の私から少し遠いけれど、これから育てたい"],
    ["leftBottom", "今の私から離れていて、もう手放してもいい"]
];

const quadrantDefaults = {
    rightTop: [
        [63, 28],
        [78, 30],
        [67, 42],
        [84, 44]
    ],
    leftTop: [
        [26, 28],
        [38, 32],
        [22, 43],
        [39, 45]
    ],
    rightBottom: [
        [62, 66],
        [79, 68],
        [68, 80],
        [84, 80]
    ],
    leftBottom: [
        [25, 66],
        [40, 69],
        [28, 80],
        [43, 82]
    ]
};

function defaultBoardPosition(note, index) {
    const quadrant = state.compass[note.key] || "rightTop";
    const choices = quadrantDefaults[quadrant] || quadrantDefaults.rightTop;
    const chosen = choices[index % choices.length];
    return { x: chosen[0], y: chosen[1] };
}

function boardPosition(note, index) {
    const saved = state.boardPositions && state.boardPositions[note.key];
    if (saved && Number.isFinite(saved.x) && Number.isFinite(saved.y)) {
        return saved;
    }
    return defaultBoardPosition(note, index);
}

function noteDisplayWidth(text) {
    const value = String(text || "ここに言葉を入力");
    const length = Math.max(7, Array.from(value).length);
    return Math.min(720, Math.max(128, 10 + length * 18));
}

    lessons.forEach((lesson) => {
        lines.push(`第${lesson.id}回 ${lesson.title}`);
        lesson.manualFields.forEach((label, index) => {
            const value = (state.manual[`lesson_${lesson.id}_manual_${index}`] || "").trim();
            if (value) {
                lines.push(`${label}：${value}`);
            }
        });
        const notes = [0, 1, 2]
            .map((index) => (state.notes[`lesson_${lesson.id}_note_${index}`] || "").trim())
            .filter(Boolean);
        if (notes.length) {
            lines.push(`付箋：${notes.join(" / ")}`);
        }
        lines.push("");
    });

    const finalWords = (state.manual.final_compass_words || "").trim();
    const returnWords = (state.manual.final_return_words || "").trim();
    if (finalWords || returnWords) {
        lines.push("羅針盤から残したい言葉");
        if (finalWords) lines.push(`今の私に一番残したい言葉：${finalWords}`);
        if (returnWords) lines.push(`迷った時に見返したい言葉：${returnWords}`);
    }
    return lines.join("\n");
}

function bindEvents() {
    document.querySelectorAll("[data-bucket][data-key]").forEach((control) => {
        const eventName = control.tagName === "SELECT" ? "change" : "input";
        control.addEventListener(eventName, () => {
            const bucket = control.dataset.bucket;
            const key = control.dataset.key;
            if (bucket === "root") {
                state[key] = control.value;
            } else {
                state[bucket] = state[bucket] || {};
                state[bucket][key] = control.value;
            }
            if (bucket === "notes") {
                const note = control.closest(".board-note");
                if (note) {
                    note.style.setProperty("--note-width", `${noteDisplayWidth(control.value)}px`);
                }
            }
            saveState();
        });
    });

    document.querySelectorAll("[data-action]").forEach((button) => {
        button.addEventListener("click", () => handleAction(button));
    });

    bindBoardDrag();
}

function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
}

function isPortraitCompassRotated() {
    if (!document.body.classList.contains("compass-only")) return false;
    if (!window.matchMedia || !window.matchMedia("(orientation: portrait)").matches) return false;
    const card = document.querySelector("#compass-map");
    if (!card || !window.getComputedStyle) return false;
    const transform = window.getComputedStyle(card).transform;
    return Boolean(transform && transform !== "none");
}

function boardPointFromEvent(event, board) {
    const boardRect = board.getBoundingClientRect();
    if (!boardRect.width || !boardRect.height) {
        return { x: 50, y: 50 };
    }

    if (isPortraitCompassRotated()) {
        const screenX = (event.clientX - boardRect.left) / boardRect.width;
        const screenY = (event.clientY - boardRect.top) / boardRect.height;
        return {
            x: (1 - screenY) * 100,
            y: screenX * 100
        };
    }

    return {
        x: ((event.clientX - boardRect.left) / boardRect.width) * 100,
        y: ((event.clientY - boardRect.top) / boardRect.height) * 100
    };
}

function noteCenterPercent(note) {
    const x = parseFloat(note.style.left);
    const y = parseFloat(note.style.top);
    return {
        x: Number.isFinite(x) ? x : 50,
        y: Number.isFinite(y) ? y : 50
    };
}

function bindBoardDrag() {
    const board = document.getElementById("interactive-compass");
    if (!board) return;
    const trash = document.getElementById("trash-zone");

    let active = null;

    board.querySelectorAll(".board-note[data-drag-key]").forEach((note) => {
        note.addEventListener("click", (event) => {
            if (note.dataset.suppressClick === "true") {
                event.preventDefault();
                event.stopPropagation();
                note.dataset.suppressClick = "";
            }
        }, true);

        note.addEventListener("pointerdown", (event) => {
            const key = note.dataset.dragKey;
            if (!key || key === "placeholder") return;
            if (event.pointerType === "mouse" && event.button !== 0) return;

            const pointer = boardPointFromEvent(event, board);
            const center = noteCenterPercent(note);

            active = {
                key,
                note,
                pointerId: event.pointerId,
                dragging: false,
                startClientX: event.clientX,
                startClientY: event.clientY,
                offsetX: center.x - pointer.x,
                offsetY: center.y - pointer.y,
                overTrash: false
            };
            if (note.setPointerCapture) {
                note.setPointerCapture(event.pointerId);
            }
        });

        note.addEventListener("pointermove", (event) => {
            if (!active || active.pointerId !== event.pointerId) return;
            const distance = Math.hypot(event.clientX - active.startClientX, event.clientY - active.startClientY);
            if (!active.dragging && distance < 7) return;
            if (!active.dragging) {
                active.dragging = true;
                active.note.classList.add("is-dragging");
                trash && trash.classList.add("is-ready");
                if (document.activeElement && document.activeElement.blur) {
                    document.activeElement.blur();
                }
            }
            const pointer = boardPointFromEvent(event, board);
            const x = clamp(pointer.x + active.offsetX, 8, 92);
            const y = clamp(pointer.y + active.offsetY, 10, 90);
            active.note.style.left = `${x}%`;
            active.note.style.top = `${y}%`;
            state.boardPositions = state.boardPositions || {};
            state.boardPositions[active.key] = { x: Math.round(x * 10) / 10, y: Math.round(y * 10) / 10 };
            if (trash) {
                const trashRect = trash.getBoundingClientRect();
                active.overTrash = event.clientX >= trashRect.left &&
                    event.clientX <= trashRect.right &&
                    event.clientY >= trashRect.top &&
                    event.clientY <= trashRect.bottom;
                trash.classList.toggle("is-over", active.overTrash);
            }
            saveState();
            event.preventDefault();
        });

        const endDrag = (event) => {
            if (!active || active.pointerId !== event.pointerId) return;
            const didDrag = active.dragging;
            const deleteKey = didDrag && active.overTrash ? active.key : "";
            const draggedNote = active.note;
            active.note.classList.remove("is-dragging");
            trash && trash.classList.remove("is-ready", "is-over");
            if (didDrag) {
                draggedNote.dataset.suppressClick = "true";
                event.preventDefault();
                window.setTimeout(() => {
                    draggedNote.dataset.suppressClick = "";
                }, 80);
            }
            active = null;
            if (deleteKey) {
                deleteBoardNote(deleteKey);
                render();
                showToast("付箋を削除しました");
            }
        };
        note.addEventListener("pointerup", endDrag);
        note.addEventListener("pointercancel", endDrag);
    });
}

function deleteBoardNote(key) {
    if (!key) return;
    state.notes = state.notes || {};
    state.compass = state.compass || {};
    state.boardPositions = state.boardPositions || {};
    state.notes[key] = "";
    delete state.compass[key];
    delete state.boardPositions[key];
    if (state.customNoteOrder) {
        state.customNoteOrder = state.customNoteOrder.filter((item) => item !== key);
    }
    saveState();
}

function handleAction(button) {
    const action = button.dataset.action;
    if (action === "load-demo") {
        applyDemoData();
        render();
        window.scrollTo(0, 0);
        showToast("仮想回答を入れて羅針盤を表示しました");
        return;
    }
    if (action === "jump-compass") {
        const target = document.getElementById("compass-map");
        if (target) {
            target.scrollIntoView({ behavior: "smooth", block: "start" });
        }
        return;
    }
    if (action === "add-board-note") {
        const key = `custom_note_${Date.now()}`;
        state.customNoteOrder = state.customNoteOrder || [];
        state.customNoteOrder.push(key);
        state.notes[key] = "新しい言葉";
        state.compass[key] = "rightTop";
        state.boardPositions[key] = { x: 52, y: 52 };
        saveState();
        render();
        const target = document.getElementById("compass-map");
        if (target) {
            target.scrollIntoView({ behavior: "smooth", block: "start" });
        }
        showToast("言葉カードを追加しました");
        return;
    }
    if (action === "teacher-toggle") {
        state.teacherMode = !state.teacherMode;
        saveState();
        render();
        showToast(state.teacherMode ? "講師メモを表示しました" : "講師メモを隠しました");
        return;
    }
    if (action === "open-lesson") {
        state.currentLesson = Number(button.dataset.lesson || 1);
        state.view = "lesson";
        saveState();
        render();
        window.scrollTo(0, 0);
        return;
    }
    if (action === "go-manual") {
        state.view = "manual";
        saveState();
        render();
        window.scrollTo(0, 0);
        return;
    }
    if (action === "complete-lesson") {
        const id = Number(button.dataset.lesson);
        state.completed[id] = !state.completed[id];
        saveState();
        render();
        showToast(state.completed[id] ? `第${id}回を完了にしました` : `第${id}回の完了を外しました`);
        return;
    }
    if (action === "reveal-aroma") {
        const id = Number(button.dataset.lesson);
        state.aromaRevealed[id] = !state.aromaRevealed[id];
        saveState();
        render();
        return;
    }
    if (action === "unlock-final") {
        state.finalUnlocked = true;
        state.view = "compass";
        saveState();
        render();
        window.scrollTo(0, 0);
        return;
    }
    if (action === "make-export") {
        state.exportText = makeExportText();
        saveState();
        render();
        showToast("まとめテキストを作りました");
        return;
    }
    if (action === "copy-export") {
        const text = state.exportText || makeExportText();
        state.exportText = text;
        saveState();
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text)
                .then(() => showToast("まとめをコピーしました"))
                .catch(() => showToast("コピーできない場合は、まとめ欄から選択してください"));
        } else {
            showToast("まとめ欄から選択してコピーできます");
        }
    }
}

function showToast(message) {
    toast.textContent = message;
    toast.classList.add("show");
    window.clearTimeout(showToast.timer);
    showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2200);
}

document.querySelectorAll("[data-view]").forEach((button) => {
    button.addEventListener("click", () => {
        state.view = button.dataset.view;
        saveState();
        render();
        window.scrollTo(0, 0);
    });
});

window.addEventListener("pagehide", saveState);
document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") {
        saveState();
    }
});

async function initApp() {
    if (!await ensureAccess()) {
        renderAccessLocked();
        return;
    }
    const restored = await restoreStateFromBackup();
    render();
    if (restored) {
        showToast("保存済みの付箋を復元しました");
    }
    requestPersistentStorage();
    registerServiceWorker();
}

initApp();

    </script>
